<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gradient Calculator</title>

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:linear-gradient(135deg,#0891b2,#6366f1);
}

.calculator{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
padding:25px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

#display{
width:100%;
height:60px;
font-size:24px;
text-align:right;
padding:10px;
border:none;
border-radius:8px;
margin-bottom:15px;
background:white;
color:black;
}

.buttons{
display:grid;
grid-template-columns:repeat(4,70px);
gap:10px;
}

button{
height:55px;
font-size:20px;
border:none;
border-radius:8px;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

.number{
background:#ffffff;
color:black;
}

.operator{
background:#0891b2;
color:white;
}

.equal{
background:#22c55e;
color:white;
grid-column:span 2;
}

.clear{
background:#ef4444;
color:white;
grid-column:span 2;
}

</style>

</head>


<body>

<div class="calculator">

<input type="text" id="display" readonly>

<div class="buttons">

<button class="number" onclick="appendValue('7')">7</button>
<button class="number" onclick="appendValue('8')">8</button>
<button class="number" onclick="appendValue('9')">9</button>
<button class="operator" onclick="appendValue('/')">÷</button>

<button class="number" onclick="appendValue('4')">4</button>
<button class="number" onclick="appendValue('5')">5</button>
<button class="number" onclick="appendValue('6')">6</button>
<button class="operator" onclick="appendValue('*')">×</button>

<button class="number" onclick="appendValue('1')">1</button>
<button class="number" onclick="appendValue('2')">2</button>
<button class="number" onclick="appendValue('3')">3</button>
<button class="operator" onclick="appendValue('-')">−</button>

<button class="number" onclick="appendValue('0')">0</button>
<button class="number" onclick="appendValue('.')">.</button>
<button class="operator" onclick="appendValue('+')">+</button>
<button class="operator" onclick="calculate()">=</button>

<button class="clear" onclick="clearDisplay()">C</button>

</div>

</div>


<script>

function appendValue(value){
document.getElementById("display").value+=value
}

function calculate(){
try{
document.getElementById("display").value=
eval(document.getElementById("display").value)
}
catch{
alert("Invalid Calculation")
}
}

function clearDisplay(){
document.getElementById("display").value=""
}

</script>

</body>

</html>
