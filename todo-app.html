<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>To-Do List App</title>

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:linear-gradient(135deg,#0891b2,#6366f1);
}

.container{
background:white;
padding:30px;
border-radius:15px;
width:350px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h2{
text-align:center;
margin-bottom:20px;
color:#0891b2;
}

.input-area{
display:flex;
gap:10px;
}

input{
flex:1;
padding:10px;
border:2px solid #0891b2;
border-radius:6px;
font-size:16px;
}

button{
padding:10px 15px;
border:none;
background:#0891b2;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

ul{
list-style:none;
padding:0;
margin-top:20px;
}

li{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
margin-bottom:10px;
background:#f3f4f6;
border-radius:6px;
}

li span{
cursor:pointer;
}

.completed{
text-decoration:line-through;
color:gray;
}

.delete{
background:#ef4444;
border:none;
color:white;
padding:5px 10px;
border-radius:5px;
cursor:pointer;
}

</style>

</head>


<body>

<div class="container">

<h2>My To-Do List</h2>

<div class="input-area">

<input id="taskInput" placeholder="Enter new task">

<button onclick="addTask()">Add</button>

</div>

<ul id="taskList"></ul>

</div>


<script>

function addTask(){

let input=document.getElementById("taskInput")
let task=input.value.trim()

if(task==="") return

let li=document.createElement("li")

li.innerHTML=
`<span onclick="toggleTask(this)">${task}</span>
<button class="delete" onclick="deleteTask(this)">Delete</button>`

document.getElementById("taskList").appendChild(li)

input.value=""

}

function deleteTask(button){
button.parentElement.remove()
}

function toggleTask(task){
task.classList.toggle("completed")
}

</script>

</body>

</html>
